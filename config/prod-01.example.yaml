# Template config for scripts/provision_fabric.py.
# Copy to config/<env>.yaml (e.g. config/prod-01.yaml) and fill in real values.
# Real *.yaml files in this folder are .gitignored — only this *.example.yaml is tracked.

workspace:
  name: <workspace-display-name>
  # Optional: SPN *object id* (not app id) to assign directly as Contributor in step 2.2c.
  # Belt-and-braces alongside the group assignment in 2.2b — guarantees the SPN sees the
  # workspace even when AAD group propagation to Fabric is slow or unreliable.
  # Get with: az ad sp show --id <app-id> --query id -o tsv
  # spn_object_id: <spn-object-id>

capacity:
  # ARM coordinates for the Fabric capacity created by step 2.1 (Platform SPN).
  # The Fabric admin creates the RG in step 1.2 and grants platform_workspace_security_group
  # Contributor on it; the Platform SPN inherits that via group membership, so step 2.1 can
  # PUT the capacity with no further Azure RBAC bootstrap.
  # Step 2.1 self-assigns capacity Admin via properties.administration.members — no manual
  # Fabric Admin portal step required (the per-capacity Contributors allow-list has no
  # public REST API; this side-steps it by making the SPN a capacity Admin via ARM).
  # Capacity name constraints: ^[a-z][a-z0-9]*$ (lowercase letters/digits, starts with letter),
  # 3-63 chars, globally unique across all Azure tenants.
  subscription_id: <azure-subscription-guid>
  resource_group: <azure-resource-group-name>
  name: <capacity-name>            # e.g. fabriccapprod01 (lowercase, ^[a-z][a-z0-9]*$)
  location: <azure-region>         # e.g. westeurope, westus3
  sku: F2                          # F2-F2048; F2 ≈ $263/mo always-on (cheapest Fabric tier)
  # Optional cache: auto-discovered & persisted to <cfg>.state.yaml by step 2.1.
  # id: <fabric-capacity-guid>

team_workspace_contributor_security_group:
  # *Team* security group: Entra ID object id of the group containing the team SPN.
  # Step 2.2 grants this group Contributor on the workspace; step 2.3 grants it
  # ConnectionCreator (need-to-know; not ConnectionCreatorWithResharing) on both gateways.
  # The team SPN runs all step 3.x by virtue of being in this group.
  object_id: <team-security-group-object-id>

platform_workspace_security_group:
  # *Platform workspace-creator* security group. Members can create Fabric workspaces.
  # Step 1.1 (Fabric admin) adds this group to the "Service principals can create
  # workspaces, connections, and deployment pipelines" tenant allow-list. Step 1.2
  # (Fabric admin) grants this group Contributor on capacity.resource_group so the
  # Platform SPN (member of this group) can PUT the Microsoft.Fabric/capacities resource
  # in step 2.1 with no further Azure RBAC bootstrap.
  # The Platform SPN must be a member of this group to run all step 2.x.
  object_id: <platform-workspace-security-group-object-id>

platform_gateway_security_group:
  # *Platform gateway-admin* security group. Step 1.3 (Fabric admin) grants this group
  # Admin on the OPDG and VDG so its members (e.g. the Platform SPN) can later
  # delegate ConnectionCreator to team secgrps without involving the Fabric admin.
  # (Docs say ConnectionCreatorWithResharing is enough to assign roles but in practice
  # only Admin works — lower roles get 403 InsufficientPermissionsToManageGateway.)
  # The Platform SPN must be a member of this group to run step 2.3.
  object_id: <platform-gateway-security-group-object-id>

# REQUIRED. Tenant settings to enable for platform_workspace_security_group in step 1.1.
# This is what makes the platform workspace-creator secgrp able to create workspaces.
# Step 1 hard-fails when this list is empty.
# Requires the Fabric admin running step 1 to have Tenant.ReadWrite.All (Preview API).
# Discover the exact setting name(s) for your tenant with:
#   python scripts/provision_fabric.py tenant-settings config/<env>.yaml
tenant_settings:
  enabled_setting_names:
    - <e.g. CreateWorkspaces>

# Azure Key Vault holding (a) the SQL password used by the OPDG source connection
# and (b) the SP secret used by the ADLS target connection.
# The Team SPN running step 3.1 needs 'Key Vault Secrets User' on this vault.
key_vault:
  vault_url: https://<your-kv-name>.vault.azure.net
  sql_password_secret_name: <kv-secret-name-for-sql-password>

gateways:
  # Use display names (preferred) — resolved via GET /v1/gateways at runtime.
  # If both name and *_id are set, the GUID wins.
  opdg: <opdg-display-name>
  vdg:  <vdg-display-name>
  # opdg_id: <opdg-guid>
  # vdg_id:  <vdg-guid>

connections:
  source:
    # Azure SQL Database reached through the OPDG (mimics on-prem / Oracle source).
    name: <source-connection-display-name>
    server:   <sql-server>.database.windows.net
    database: <database-name>
    credential:
      type: Basic                              # SQL auth: username here, password from KV
      username: <sql-username>
  target:
    # ADLS Gen2 target. Created as a ShareableCloud connection with
    # allowConnectionUsageInGateway=true so the OPDG can use it for the sink leg.
    # Authenticated as the SPN; secret pulled from KV at step 3.1 runtime.
    name: <target-connection-display-name>
    adls_account: <adls-account-name>
    container: <container-name>
    credential:
      type: ServicePrincipal
      tenant_id: <entra-tenant-guid>
      client_id: <spn-app-id-guid>
      secret_name: <kv-secret-name-for-spn-secret>

pipeline:
  name: <pipeline-display-name>
  # Query executed against the SQL source.
  source_query: SELECT * FROM SalesLT.Customer
  # Sub-folder within the target container (blank = container root) + output file name.
  # ADLS Gen2 sink requires a non-empty folder path (container root is rejected).
  target_path: <folder>/<subfolder>
  target_file_name: <output-file>.parquet
