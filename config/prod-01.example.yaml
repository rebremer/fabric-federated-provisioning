# Template config for scripts/provision_fabric.py.
# Copy to config/<env>.yaml (e.g. config/prod-01.yaml) and fill in real values.
# Real *.yaml files in this folder are .gitignored — only this *.example.yaml is tracked.

workspace:
  name: <workspace-display-name>
  # Optional: Fabric capacity GUID to bind the new workspace to.
  capacity_id: <fabric-capacity-guid>
  # Optional: SPN *object id* (not app id) to assign directly as Contributor in step 2.3.
  # Belt-and-braces alongside the group assignment in 2.2 — guarantees the SPN sees the
  # workspace even when AAD group propagation to Fabric is slow or unreliable.
  # Get with: az ad sp show --id <app-id> --query id -o tsv
  # spn_object_id: <spn-object-id>

security_group:
  # *Team* security group: Entra ID object id of the group containing the team SPN.
  # Step 2 grants this group Contributor on the workspace; step 3 grants it
  # ConnectionCreator on both gateways. The team SPN runs steps 4-6 by virtue
  # of being in this group.
  object_id: <team-security-group-object-id>

platform_workspace_security_group:
  # *Platform workspace-creator* security group. Members can create Fabric workspaces.
  # Gated by the Fabric tenant setting "Service principals can create workspaces,
  # connections, and deployment pipelines" — add this group to its allow-list in
  # the Admin portal (one-time, manual; no REST API for tenant settings writes).
  # The Platform SPN must be a member of this group to run step 2.
  # Not referenced by the script at runtime; documented here for clarity.
  object_id: <platform-workspace-security-group-object-id>

platform_gateway_security_group:
  # *Platform gateway-admin* security group. Step 1 (Fabric admin) grants this group
  # Admin on the OPDG and VDG so its members (e.g. the Platform SPN) can later
  # delegate ConnectionCreator to team secgrps without involving the Fabric admin.
  # The Platform SPN must be a member of this group to run step 3.
  object_id: <platform-gateway-security-group-object-id>

# Azure Key Vault holding (a) the SQL password used by the OPDG source connection
# and (b) the SP secret used by the ADLS target connection.
# The Team SPN running step 4 needs 'Key Vault Secrets User' on this vault.
key_vault:
  vault_url: https://<your-kv-name>.vault.azure.net
  sql_password_secret_name: <kv-secret-name-for-sql-password>

gateways:
  # Use display names (preferred) — resolved via GET /v1/gateways at runtime.
  # If both name and *_id are set, the GUID wins.
  opdg: <opdg-display-name>
  vdg:  <vdg-display-name>
  # opdg_id: <opdg-guid>
  # vdg_id:  <vdg-guid>

connections:
  source:
    # Azure SQL Database reached through the OPDG (mimics on-prem / Oracle source).
    name: <source-connection-display-name>
    server:   <sql-server>.database.windows.net
    database: <database-name>
    credential:
      type: Basic                              # SQL auth: username here, password from KV
      username: <sql-username>
  target:
    # ADLS Gen2 target. Created as a ShareableCloud connection with
    # allowConnectionUsageInGateway=true so the OPDG can use it for the sink leg.
    # Authenticated as the SPN; secret pulled from KV at step 4 runtime.
    name: <target-connection-display-name>
    adls_account: <adls-account-name>
    container: <container-name>
    credential:
      type: ServicePrincipal
      tenant_id: <entra-tenant-guid>
      client_id: <spn-app-id-guid>
      secret_name: <kv-secret-name-for-spn-secret>

pipeline:
  name: <pipeline-display-name>
  # Query executed against the SQL source.
  source_query: SELECT * FROM SalesLT.Customer
  # Sub-folder within the target container (blank = container root) + output file name.
  # ADLS Gen2 sink requires a non-empty folder path (container root is rejected).
  target_path: <folder>/<subfolder>
  target_file_name: <output-file>.parquet
