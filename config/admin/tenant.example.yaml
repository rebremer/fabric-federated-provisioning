# Per-environment config for scripts/admin/bootstrap.py — Fabric admin persona.
# Copy this file to config/admin/tenant.yaml (or tenant-<env>.yaml) and edit values.
# Real *.yaml files in config/ are .gitignored — only this *.example.yaml is tracked.
#
# Owned by: the Fabric admin (human or bootstrap SPN with Entra Fabric Administrator role).
# Read by:  scripts/admin/bootstrap.py
#
# This YAML carries ONLY what admin step 1 needs:
#   - tenant_settings.enabled_setting_names  (1.1)
#   - capacity.subscription_id / resource_group / location  (1.2)
#   - platform_workspace_security_group.object_id  (1.1 + 1.2 target)
#   - platform_gateway_security_group.object_id    (1.3 target, integration variants)
#   - gateways: opdg / vdg                         (1.3 target, integration variants)
#
# It must NOT contain workspace.* / connections.* / pipeline.* / key_vault.* —
# those are owned by platform_team and workspace_team YAMLs.

capacity:
  # ARM coordinates for the Fabric capacity RG. Admin step 1.2 creates the RG and grants
  # platform_workspace_security_group Contributor on it. The capacity itself is created
  # by the Platform SPN in step 2.1 — that lives in the platform_team/<variant>.yaml.
  subscription_id: <azure-subscription-guid>
  resource_group: <azure-resource-group-name>
  location: <azure-region>         # e.g. westeurope, westus3

platform_workspace_security_group:
  # *Platform workspace-creator* security group. Members can create Fabric workspaces.
  # Step 1.1 adds this group to the "Service principals can create workspaces, connections,
  # and deployment pipelines" tenant allow-list. Step 1.2 grants this group Contributor
  # on capacity.resource_group.
  object_id: <platform-workspace-security-group-object-id>

platform_gateway_security_group:
  # *Platform gateway-admin* security group. Step 1.3 grants this group Admin on the OPDG
  # and VDG so its members (the integration Platform SPN) can delegate ConnectionCreator
  # to team secgrps without involving the Fabric admin.
  # OMIT this section for a PBI-only platform variant that doesn't use OPDG/VDG.
  object_id: <platform-gateway-security-group-object-id>

# REQUIRED. Tenant settings to enable for platform_workspace_security_group in step 1.1.
# Discover names with: python scripts/admin/bootstrap.py tenant-settings config/admin/tenant.yaml
tenant_settings:
  enabled_setting_names:
    - <e.g. CreateAppWorkspaces>

# Gateways to grant the platform gateway-admin secgrp Admin on (step 1.3).
# OMIT this section for a PBI-only platform variant — step 1.3 then no-ops.
gateways:
  # Use display names (preferred) — resolved via GET /v1/gateways at runtime.
  # If both name and *_id are set, the GUID wins.
  opdg: <opdg-display-name>
  vdg:  <vdg-display-name>
  # opdg_id: <opdg-guid>
  # vdg_id:  <vdg-guid>
